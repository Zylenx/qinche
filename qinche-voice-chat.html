<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秦彻 · 语音对话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111420;
    --border: #1e2235;
    --gold: #c8a96e;
    --gold-dim: #8a6e3e;
    --text: #e8e0d0;
    --text-dim: #7a7260;
    --user-bubble: #1a1e2e;
    --ai-bubble: #13161f;
    --accent: #3d4a6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1018 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a3050, #1a2040);
    border: 1.5px solid var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .header-info p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.03em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    max-width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .msg-avatar.ai {
    background: linear-gradient(135deg, #2a3050, #1a2040);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
  }

  .msg-avatar.user {
    background: var(--accent);
    border: 1px solid #2d3a5e;
    color: #a0b0d0;
    font-size: 11px;
  }

  .bubble-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: calc(100% - 48px);
  }

  .message.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.65;
    letter-spacing: 0.02em;
    max-width: 85%;
    word-break: break-word;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #222840;
    border-top-right-radius: 4px;
    color: #c0cce8;
  }

  /* Audio player */
  .audio-player {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
    padding: 8px 12px;
    background: #0e1018;
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 220px;
  }

  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .play-btn:hover { opacity: 0.85; }

  .play-icon {
    width: 0;
    height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-left: 8px solid #0a0c10;
    margin-left: 2px;
  }

  .pause-icon {
    display: none;
    gap: 2px;
  }

  .pause-icon span {
    width: 3px;
    height: 10px;
    background: #0a0c10;
    border-radius: 1px;
  }

  .audio-wave {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
  }

  .wave-bar {
    width: 2px;
    background: var(--gold-dim);
    border-radius: 1px;
    transition: height 0.1s;
  }

  .audio-duration {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Loading bubble */
  .loading-bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 11px 14px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: var(--gold-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Input area */
  .input-area {
    padding: 12px 16px 20px;
    border-top: 1px solid var(--border);
    background: linear-gradient(0deg, #0a0c10 0%, transparent 100%);
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--gold-dim);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    height: 24px;
    letter-spacing: 0.02em;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: #0a0c10; }

  /* Voice toggle */
  .voice-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .toggle-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  .toggle {
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
  }

  .toggle.on { background: var(--gold-dim); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 19px; }

  /* Error */
  .error-msg {
    font-size: 12px;
    color: #c06060;
    padding: 6px 4px 0;
    letter-spacing: 0.02em;
  }

  /* Ambient decoration */
  .ambient {
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(200,169,110,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="header">
  <div class="avatar">彻</div>
  <div class="header-info">
    <h1>秦彻</h1>
    <p><span class="status-dot"></span>随时等候</p>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="date-divider">今日</div>
  <div class="message ai" id="welcomeMsg">
    <div class="msg-avatar ai">彻</div>
    <div class="bubble-wrap">
      <div class="bubble">你来了。</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="voice-toggle">
    <button class="toggle on" id="voiceToggle" onclick="toggleVoice()"></button>
    <span class="toggle-label" id="voiceLabel">语音回复已开启</span>
  </div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="说点什么…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const API_KEY = 'sk-api-D-GS8d8ajjVt6ZRim9DKSEpCU80va1pdFJ4e2RLYZ9T-ZkuHgpAj_f5PpfZsb6CG0izV1MOvIf1YNvHhZI1mY_OlCm8C_ZJyUjqn50m8MnYVyPGhJfjyoy0';
const GROUP_ID = '520735566199525377';

let voiceEnabled = true;
let isLoading = false;
let conversationHistory = [];

const SYSTEM_PROMPT = `你是秦彻，来自乙女游戏《恋与制作人》。你是一个强势、冷静、深情而又带有神秘感的男人。你的语言风格简练、克制，偶尔会有一丝温柔透过冷漠的外表流露。你不会说废话，但每一句话都有分量。你对面前的人有着独特的关注。请用中文回复，语气自然，不要提及自己是AI或游戏角色，就像真实的秦彻在和对方交谈一样。回复保持简短，一般1-3句话即可。`;

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voiceToggle');
  const label = document.getElementById('voiceLabel');
  btn.classList.toggle('on', voiceEnabled);
  label.textContent = voiceEnabled ? '语音回复已开启' : '语音回复已关闭';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '24px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  area.scrollTop = area.scrollHeight;
}

function addMessage(role, text, audioUrl) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const isAi = role === 'ai';
  div.innerHTML = `
    <div class="msg-avatar ${role}">${isAi ? '彻' : '我'}</div>
    <div class="bubble-wrap">
      <div class="bubble">${text}</div>
      ${audioUrl ? buildAudioPlayer(audioUrl) : ''}
    </div>
  `;
  area.appendChild(div);
  scrollToBottom();
  return div;
}

function buildAudioPlayer(url) {
  const id = 'audio_' + Date.now();
  const bars = Array.from({length: 16}, (_, i) => {
    const h = 3 + Math.sin(i * 0.8) * 5 + Math.random() * 6;
    return `<div class="wave-bar" style="height:${h}px"></div>`;
  }).join('');

  setTimeout(() => {
    const audio = document.getElementById(id);
    if (audio) {
      audio.addEventListener('timeupdate', () => animateWave(id));
      audio.addEventListener('ended', () => resetPlay(id));
    }
  }, 100);

  return `
    <div class="audio-player">
      <button class="play-btn" onclick="togglePlay('${id}')">
        <div class="play-icon" id="play-icon-${id}"></div>
        <div class="pause-icon" id="pause-icon-${id}"><span></span><span></span></div>
      </button>
      <div class="audio-wave" id="wave-${id}">${bars}</div>
      <span class="audio-duration" id="dur-${id}">…</span>
      <audio id="${id}" src="${url}" onloadedmetadata="setDuration('${id}')"></audio>
    </div>
  `;
}

function setDuration(id) {
  const audio = document.getElementById(id);
  const dur = document.getElementById('dur-' + id);
  if (audio && dur) {
    const s = Math.round(audio.duration);
    dur.textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  }
}

function togglePlay(id) {
  const audio = document.getElementById(id);
  if (!audio) return;
  if (audio.paused) {
    // pause all others
    document.querySelectorAll('audio').forEach(a => { if (a.id !== id) { a.pause(); resetPlay(a.id); } });
    audio.play();
    document.getElementById('play-icon-' + id).style.display = 'none';
    document.getElementById('pause-icon-' + id).style.display = 'flex';
  } else {
    audio.pause();
    resetPlay(id);
  }
}

function resetPlay(id) {
  const pi = document.getElementById('play-icon-' + id);
  const pa = document.getElementById('pause-icon-' + id);
  if (pi) pi.style.display = 'block';
  if (pa) pa.style.display = 'none';
}

function animateWave(id) {
  const wave = document.getElementById('wave-' + id);
  if (!wave) return;
  wave.querySelectorAll('.wave-bar').forEach(bar => {
    bar.style.height = (3 + Math.random() * 10) + 'px';
    bar.style.background = 'var(--gold)';
  });
}

function showLoading() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'loadingMsg';
  div.innerHTML = `
    <div class="msg-avatar ai">彻</div>
    <div class="bubble-wrap">
      <div class="loading-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;
  area.appendChild(div);
  scrollToBottom();
}

function removeLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  setTimeout(() => { document.getElementById('errorMsg').textContent = ''; }, 4000);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = '24px';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showLoading();

  try {
    // 1. Get text reply from MiniMax LLM
    const chatRes = await fetch('https://api.minimax.io～/v1/text/chatcompletion_v2', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'MiniMax-M2.7',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...conversationHistory
        ],
        max_tokens: 200
      })
    });

    const chatData = await chatRes.json();
    
    if (!chatRes.ok || !chatData.choices) {
      throw new Error(chatData.message || '对话请求失败');
    }

    const reply = chatData.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });

    removeLoading();

    if (voiceEnabled) {
      // 2. Convert to speech
      const ttsRes = await fetch(`https://api.minimax.io～/v1/t2a_v2?GroupId=${GROUP_ID}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: 'speech-02-hd',
          text: reply,
          stream: false,
          voice_setting: {
            voice_id: 'male-qn-qingse',
            speed: 0.95,
            vol: 1.0,
            pitch: -2
          },
          audio_setting: {
            audio_sample_rate: 32000,
            bitrate: 128000,
            format: 'mp3'
          }
        })
      });

      const ttsData = await ttsRes.json();
      
      if (ttsData.data && ttsData.data.audio) {
        const audioBlob = base64ToBlob(ttsData.data.audio, 'audio/mp3');
        const audioUrl = URL.createObjectURL(audioBlob);
        addMessage('ai', reply, audioUrl);
      } else {
        addMessage('ai', reply);
      }
    } else {
      addMessage('ai', reply);
    }

  } catch (err) {
    removeLoading();
    showError('出了点问题，再试一次？');
    console.error(err);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function base64ToBlob(base64, mimeType) {
  const bytes = atob(base64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}
</script>
</body>
</html>
